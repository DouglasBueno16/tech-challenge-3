name: Pipeline-CI-CD-Tech3

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    branches: [ "main" ]


jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker build
        run: |
          echo "Deploying application..."
          docker build -t douglasbueno/tech-challenge3:latest .
      
      - name: Docker push
        run: |
          docker push douglasbueno/tech-challenge3:latest