# Main CI/CD pipeline workflow for Tech Challenge 3

name: Pipeline-CI-CD-Tech3

on:
  # push:
  #   branches: [ "main" ]
  workflow_dispatch:
    branches: [ "main" ]

jobs:

  build: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "These aren't the tests you're looking for..."
          # To do: add real tests here

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint
      
      - name: Run pylint
        run: |
          pylint --disable E0401 --fail-under=8.0 app.py

  check-security:
    uses: ./.github/workflows/security.yaml

  publish-image:
    needs: [build, lint, check-security]
    runs-on: ubuntu-latest
    # Only publish Docker image when changes are pushed to the main branch
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker build
        run: |
          echo "Deploying application..."
          docker build -t douglasbueno/tech-challenge3:latest -t douglasbueno/tech-challenge3:${{ github.sha }} .
      
      - name: Docker push
        run: |
          docker push douglasbueno/tech-challenge3:latest
          docker push douglasbueno/tech-challenge3:${{ github.sha }}
          docker push douglasbueno/tech-challenge3:latest
