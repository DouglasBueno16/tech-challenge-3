# Workflow for security checks

name: Security-Checks
on:
  workflow_dispatch:
    branches: [ "main" ]
  workflow_call:

jobs:

  git-leaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  SAST:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      
      - name: Run bandit
        run: |
          bandit -r . --severity-level high

  Trivy:
    uses: aquasecurity/trivy-action@v0.36.0
    with:
      scan-type: 'fs'
      severity: 'HIGH,CRITICAL'
      