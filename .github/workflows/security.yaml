# Workflow for security checks

name: Security-Checks
on:
  workflow_dispatch:
    branches: [ "main" ]
  workflow_call:

jobs:

  git-leaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  SCA:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install trivy
        run: |
          python -m pip install --upgrade pip
          pip install trivy

      - name: Run trivy
        run: |
          trivy fs --exit-code 1 --severity HIGH,CRITICAL .

  SAST:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      
      - name: Run bandit
        run: |
          bandit -r . -ll
